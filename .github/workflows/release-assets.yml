name: Release assets

# Allega ZIP portabile (script esistente) + license-server alla release GitHub.
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag Git già esistente (es. v1.1.0-rc1)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  windows-assets:
    runs-on: windows-latest
    steps:
      - name: Risolvi tag release
        id: meta
        shell: bash
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.meta.outputs.tag }}

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: MinGW (CGO)
        run: |
          choco install mingw -y --no-progress
          "C:\ProgramData\mingw64\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8

      - name: ZIP portabile (packaging/build-release.ps1)
        shell: pwsh
        env:
          CGO_ENABLED: "1"
        run: |
          $tag = "${{ steps.meta.outputs.tag }}"
          $ver = $tag.TrimStart('v')
          & "${{ github.workspace }}/packaging/build-release.ps1" -Version $ver

      - name: license-server Windows amd64
        run: go build -trimpath -ldflags="-s -w" -o license-server-windows-amd64.exe ./cmd/license-server

      - name: Carica asset sulla release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          files: |
            artifacts/out/NeuralPath-Tactical-Guard-*-win-x64-portable.zip
            artifacts/out/SHA256.txt
            license-server-windows-amd64.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
